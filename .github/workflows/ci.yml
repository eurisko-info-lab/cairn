name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - uses: coursier/setup-action@v1
        with:
          apps: scala-cli
      - name: Full test suite (incl. fuzz corpus + host-run ports)
        run: sbt -batch test
      - name: Fat jar + bin/cairn smoke
        run: |
          sbt -batch examples/assembly
          HOME_TMP=$(mktemp -d)
          export CAIRN_HOME="$HOME_TMP"
          ./bin/cairn peer list
          ./bin/cairn peer add a http://127.0.0.1:1
          ./bin/cairn peer list | grep -q a
          ./bin/cairn smoke distribution | tee /tmp/cairn-smoke-dist.txt
          grep -q 'smoke distribution ok' /tmp/cairn-smoke-dist.txt
      - name: Multi-home ceremony via bin/cairn
        run: |
          export CAIRN_KEYSTORE_SECRET='ci-ceremony-secret'
          XCHG=$(mktemp -d)
          declare -A HOMES
          for id in r0 r1 r2 r3; do
            HOMES[$id]=$(mktemp -d)
            CAIRN_HOME="${HOMES[$id]}" ./bin/cairn bft replica-set keygen "$id"
            CAIRN_HOME="${HOMES[$id]}" ./bin/cairn bft replica-set export-pubkey "$id" "$XCHG/$id.pubkey.canon"
          done
          COORD="${HOMES[r0]}"
          for id in r0 r1 r2 r3; do
            CAIRN_HOME="$COORD" ./bin/cairn bft replica-set import-pubkey "$XCHG/$id.pubkey.canon"
          done
          CAIRN_HOME="$COORD" ./bin/cairn bft replica-set assemble r0 r1 r2 r3
          CAIRN_HOME="$COORD" ./bin/cairn bft replica-set export-draft "$XCHG/draft.canon"
          for id in r0 r1 r2 r3; do
            CAIRN_HOME="${HOMES[$id]}" ./bin/cairn bft replica-set import-draft "$XCHG/draft.canon"
            CAIRN_HOME="${HOMES[$id]}" ./bin/cairn bft replica-set seal "$id"
            cp "${HOMES[$id]}/ceremony/seals/$id.canon" "$XCHG/$id.seal.canon"
          done
          for id in r0 r1 r2 r3; do
            CAIRN_HOME="$COORD" ./bin/cairn bft replica-set import-seal "$XCHG/$id.seal.canon"
          done
          CAIRN_HOME="$COORD" ./bin/cairn bft replica-set finalize
          CAIRN_HOME="$COORD" ./bin/cairn bft replica-set export "$XCHG/replica-set.bundle.canon"
          for id in r1 r2 r3; do
            CAIRN_HOME="${HOMES[$id]}" ./bin/cairn bft replica-set install "$XCHG/replica-set.bundle.canon"
            CAIRN_HOME="${HOMES[$id]}" ./bin/cairn bft replica-set status | tee "/tmp/cairn-cer-$id.txt"
            grep -q 'n=4' "/tmp/cairn-cer-$id.txt"
          done
          CAIRN_HOME="$COORD" ./bin/cairn bft replica-set status | tee /tmp/cairn-cer-coord.txt
          grep -q 'n=4' /tmp/cairn-cer-coord.txt
          echo 'ceremony via bin/cairn ok'
      - name: Golden digests (languages + Rosetta)
        run: |
          sbt -batch "examples/runMain cairn.examples.Main digests" | tee /tmp/cairn-digests-raw.txt
          grep -E '^(language|  fragment|rosetta) ' /tmp/cairn-digests-raw.txt > /tmp/cairn-digests.txt
          diff -u app/tests/golden/digests.txt /tmp/cairn-digests.txt
      - name: MVP transcript (fresh-checkout reproducibility)
        run: sbt -batch "examples/runMain cairn.examples.Main transcript transcripts/mvp.cairn"
      - name: MAX transcript (3 nodes, gossip, ports, queries)
        run: sbt -batch "examples/runMain cairn.examples.Main transcript transcripts/max.cairn"
      - name: Language files are in sync with the meta surface
        run: |
          sbt -batch "examples/runMain cairn.examples.Main emit-languages"
          git diff --exit-code content/languages/
      - name: Benchmarks (informational)
        run: sbt -batch "examples/runMain cairn.examples.Bench"
